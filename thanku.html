<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
      position:relative;
      padding:20px;
    }

    /* Animated circles */
    .circle{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      animation:float 8s infinite ease-in-out;
    }

    .circle:nth-child(1){
      width:220px;
      height:220px;
      top:-50px;
      left:-50px;
    }

    .circle:nth-child(2){
      width:180px;
      height:180px;
      bottom:-40px;
      right:-30px;
      animation-delay:2s;
    }

    .circle:nth-child(3){
      width:120px;
      height:120px;
      top:50%;
      left:10%;
      animation-delay:4s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-20px);
      }
    }

    .thankyou-card{
      position:relative;
      z-index:2;
      width:100%;
      max-width:550px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.2);
      padding:55px 35px;
      border-radius:28px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,0.3);
      animation:show 0.7s ease;
    }

    @keyframes show{
      from{
        opacity:0;
        transform:scale(0.8);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    .check{
      width:110px;
      height:110px;
      margin:0 auto 25px;
      border-radius:50%;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:55px;
      color:white;
      box-shadow:0 10px 25px rgba(34,197,94,0.5);
      animation:pop 0.6s ease;
    }

    @keyframes pop{
      0%{
        transform:scale(0);
      }
      100%{
        transform:scale(1);
      }
    }

    h1{
      color:#fff;
      font-size:42px;
      margin-bottom:15px;
      font-weight:700;
    }

    p{
      color:#e5e7eb;
      font-size:17px;
      line-height:1.8;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      border-radius:50px;
      background:#fff;
      color:#1e3a8a;
      text-decoration:none;
      font-weight:600;
      transition:0.3s ease;
      box-shadow:0 8px 20px rgba(255,255,255,0.25);
    }

    .btn:hover{
      transform:translateY(-3px);
      background:#dbeafe;
    }

    /* Responsive */
    @media(max-width:600px){

      .thankyou-card{
        padding:40px 20px;
      }

      .check{
        width:90px;
        height:90px;
        font-size:45px;
      }

      h1{
        font-size:32px;
      }

      p{
        font-size:15px;
      }

      .btn{
        width:100%;
        padding:14px;
      }
    }
  </style>
</head>

<body>

  <!-- Background Animation -->
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <!-- Thank You Card -->
  <div class="thankyou-card">

    <div class="check">✓</div>

    <h1>Thank You!</h1>

    <p>
      Your form has been submitted successfully. <br>
      Our team will contact you shortly.
    </p>

    <a href="index.html" class="btn">Back To Home</a>

  </div>

</body>
</html>
